description = "List/register oh-my-antigravity built-in MCP tools (file/git/http/process)."
prompt = """
Manage oh-my-antigravity built-in CLI MCP tools.

Actions:
1. Inspect available tools:
   - oh-my-antigravity tools list --json
   - alias: omg tools list --json
2. Produce Gemini extension mcpServers registration payload:
   - oh-my-antigravity tools manifest --json
   - alias: omg tools manifest --json
3. If user asks for selective categories, pass `--categories file,git,http,process` subset.
4. Report:
   - command(s) executed,
   - selected categories,
   - generated `mcpServers` snippet for Gemini settings/extension manifest.
"""
