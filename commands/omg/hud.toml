description = "Render the oh-my-antigravity HUD status overlay with progress indicators."
prompt = """
Render omg HUD status overlay.

If args are provided:
  oh-my-antigravity hud {{args}}
  # alias: omg hud {{args}}
Else:
  oh-my-antigravity hud --preset focused

Examples:
  oh-my-antigravity hud --team oh-my-antigravity --preset minimal
  oh-my-antigravity hud --watch --interval-ms 1000
  oh-my-antigravity hud --team oh-my-antigravity --json

Report:
1) preset/team used,
2) status overlay output,
3) progress indicators (tasks/workers),
4) Gemini API metadata summary (model/api source/quota if available).
"""
